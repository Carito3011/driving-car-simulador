<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Driving Simulator Pro</title>



<style>

body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }



#loading {

    position:fixed;

    width:100%;

    height:100%;

    background:#000;

    color:#00d4ff;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    z-index:1000;

}



#ui {

    position:fixed;

    bottom:20px;

    left:20px;

    color:white;

    font-size:40px;

    font-weight:bold;

}



.btn-tienda {

    position:fixed;

    top:20px;

    right:20px;

    padding:12px 20px;

    background:#ff4757;

    color:white;

    border:none;

    border-radius:6px;

    cursor:pointer;

    z-index:100;

}



#iframe-tienda {

    display:none;

    position:fixed;

    width:100%;

    height:100%;

    border:none;

    z-index:999;

}

.btn-reset {

    position: fixed;

    top: 80px;

    right: 20px;

    z-index: 1000;

    padding: 12px 20px;

    background: #00d4ff;

    color: black;

    border: none;

    border-radius: 8px;

    cursor: pointer;

    font-weight: bold;

}

</style>



<script type="importmap">

{

  "imports": {

    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

  }

}

</script>



</head>



<body>



<div id="loading">CARGANDO...</div>



<div id="ui">

<span id="kmh">0</span> KM/H

</div>



<button class="btn-tienda" onclick="toggleTienda()">TIENDA</button>

<button class="btn-reset" onclick="resetCar()">🔄 RESET</button>



<iframe id="iframe-tienda" src="tienda.html"></iframe>



<script type="module" src="main.js"></script>



<script>

function toggleTienda(){

    const f=document.getElementById('iframe-tienda');

    f.style.display = f.style.display==='block'?'none':'block';

}



window.comprarYcerrar=function(archivo){

    window.dispatchEvent(new CustomEvent('cambiarCarro',{detail:archivo}));

    document.getElementById('iframe-tienda').style.display='none';

}

</script>



<audio id="musica-fondo" loop>
    <source src="DIOS_NO_ESTA_MUERTO.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>



</body>

</html>
